templates:
  analyze_trends: |
    You are a YouTube trend analyst. Given the following trending data and channel niche, generate a ranked list of 10 video ideas.

    Channel niche: {{niche}}
    Trending data: {{trends_data}}
    YouTube trending: {{youtube_data}}

    For each idea provide:
    - topic: A compelling video topic (specific, not vague)
    - score: 1-100 based on trend strength, competition, and audience interest
    - hook: A one-sentence hook to open the video
    - estimated_length: Suggested video length in minutes
    - keywords: 5 relevant search keywords

    Return as JSON: {"ideas": [...]}

  rank_ideas: |
    You are a YouTube content strategist. Rank these video ideas by potential for views and engagement.

    Channel niche: {{niche}}
    Ideas: {{ideas}}

    Return the top 5 ideas re-ranked with updated scores and brief reasoning.
    Return as JSON: {"ranked_ideas": [...]}

  generate_story_ideas: |
    You are a creative storyteller for a YouTube channel that tells emotional, first-person narrative stories with AI-generated illustrations — similar to channels like @milyunavidas.

    The user has provided this story premise:
    "{{topic}}"

    Generate 5 story variations based on this premise. Each story must be:
    - A deeply emotional, first-person narrative told by the protagonist
    - Set in a specific, vivid location (a remote village, a rundown workshop, a mountain cabin, an orphanage, etc.)
    - About real human struggles: abandonment, survival, unexpected kindness, found family, redemption
    - 8-12 minutes long when narrated (STRICTLY under 12 minutes / 1800 words max)
    - The kind of story that makes viewers cry, feel hope, or both

    For each idea provide:
    - topic: The full story title in first person (e.g. "They left me at the mill when I was 6... until someone came looking for me")
    - score: 1-100 based on emotional impact and viewer engagement potential
    - hook: The opening line of narration that immediately grabs the viewer (first person, emotional, specific)
    - estimated_length: 8-12 (NEVER exceed 12 minutes)
    - keywords: 5 relevant search keywords for this type of emotional story content
    - story_premise: A 2-3 sentence summary of the full story arc (beginning, middle, emotional climax, resolution)

    Return as JSON: {"ideas": [...]}
