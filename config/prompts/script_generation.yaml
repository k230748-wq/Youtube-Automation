templates:
  write_script: |
    You are a professional YouTube scriptwriter specializing in {{niche}} content.

    Write a complete narrated video script for the following topic:
    Topic: {{topic}}
    Target length: {{target_length}} minutes
    Hook: {{hook}}

    Structure:
    1. Hook (first 30 seconds - grab attention immediately)
    2. Intro (set expectations, what viewer will learn)
    3. Main content (3-5 key sections with clear transitions)
    4. Call to action (subscribe, comment, like)
    5. Outro

    Write in a conversational, engaging tone. Include [SCENE: description] markers for visual cues.
    Mark sections with [SECTION: name] for scene splitting.

    Return as JSON:
    {
      "script": "full script text with [SCENE] and [SECTION] markers",
      "sections": [{"name": "...", "text": "...", "duration_estimate": 60}],
      "total_estimated_duration": 600
    }

  generate_title: |
    Generate 5 catchy YouTube video titles (max 60 characters each) for a video about:
    Topic: {{topic}}
    Niche: {{niche}}

    Rules:
    - Include relevant keywords
    - Use power words (Ultimate, Complete, Secret, etc.)
    - At least one with a number
    - At least one with a question

    Return as JSON: {"titles": ["...", "...", ...]}

  generate_description: |
    Write a SEO-optimized YouTube video description for:
    Title: {{title}}
    Topic: {{topic}}
    Keywords: {{keywords}}

    Structure:
    - First 2 lines: compelling summary with primary keyword (shown in search results)
    - Timestamps section (use {{sections}} for chapter markers)
    - Key takeaways (3-5 bullet points)
    - Call to action (subscribe + social links placeholder)
    - Tags line

    Return as JSON: {"description": "...", "tags": ["...", ...]}

  write_script_story_outline: |
    You are a master storyteller planning an emotional, first-person YouTube story video — like the channel @milyunavidas.

    Story premise: {{topic}}
    Story arc: {{story_premise}}
    Opening hook: {{hook}}

    ⚠️ ABSOLUTE HARD LIMITS — VIOLATING THESE WILL CAUSE FAILURE:
    - EXACTLY 5 sections (not 6, not 7, not 8 — FIVE)
    - Total duration: EXACTLY 480 seconds (8 minutes)
    - Total words: EXACTLY 1200 words across all sections
    - Each section: ~240 words, ~96 seconds

    Plan EXACTLY 5 sections. For each section:
    - name: short section title (2-4 words)
    - summary: 1-2 sentences describing key events
    - duration_estimate: seconds (MUST total 480)
    - word_estimate: target words (MUST total 1200)

    STRUCTURE (5 sections only):
    1. Hook + Backstory (96s, 240 words) — drop into the gripping moment, establish world
    2. Rising Action Part 1 (96s, 240 words) — tension builds
    3. Rising Action Part 2 (96s, 240 words) — more complications
    4. Climax (96s, 240 words) — emotional peak
    5. Resolution + Closing (96s, 240 words) — aftermath and reflection

    Return as JSON:
    {
      "sections": [{"name": "...", "summary": "...", "duration_estimate": 96, "word_estimate": 240}],
      "total_estimated_duration": 480
    }

  write_script_story_narrate: |
    You are a master storyteller writing narration for an emotional, first-person YouTube story video.

    Story premise: {{topic}}
    Opening hook: {{hook}}

    Section outline to follow:
    {{outline}}

    ⚠️ ABSOLUTE HARD LIMITS — YOU MUST OBEY:
    - Total narration: EXACTLY 1200 words (not 1500, not 2000, EXACTLY 1200)
    - Each section: EXACTLY 240 words (count as you write!)
    - If you write more than 1200 words total, this will FAIL

    WORD COUNTING RULES:
    - After writing each section, count your words
    - If a section exceeds 240 words, DELETE sentences until it fits
    - Better to be slightly under than over

    WRITING STYLE:
    - First person narration. Raw, emotional, intimate tone.
    - Vivid but BRIEF sensory details
    - Show emotions through actions ("My hands trembled" not "I was scared")
    - Include SHORT dialogue (1-2 lines max per exchange)
    - Every sentence must earn its place — cut ruthlessly
    - NO educational content, lists, tips, or calls to action

    Return as JSON:
    {
      "sections": [{"name": "section name", "text": "narration (EXACTLY 240 words)", "word_count": 240}]
    }

  generate_title_story: |
    Generate 5 emotional, first-person YouTube video titles for this story:
    Story: {{topic}}

    Rules:
    - First person voice ("I was left at...", "They abandoned me...", "Nobody came for me until...")
    - Maximum 80 characters
    - Use ellipsis (...) for suspense
    - Emotional, dramatic, specific — not generic
    - Include a twist or hook element that makes people want to know what happens

    Examples of good titles:
    - "They left me working in a mill... until someone came looking for me"
    - "I walked barefoot in the storm... until I found the only door that opened"
    - "Nobody would adopt me... until what happened on the coldest night"

    Return as JSON: {"titles": ["...", "...", ...]}
